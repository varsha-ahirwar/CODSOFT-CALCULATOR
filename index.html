<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glass Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="prev-op"></div>
            <div class="current-operand" id="curr-op">0</div>
        </div>
        <div class="buttons">
            <button class="span-two op" onclick="clearDisplay()">AC</button>
            <button class="op" onclick="deleteLast()">DEL</button>
            <button class="op" onclick="appendOperator('/')">÷</button>
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="op" onclick="appendOperator('*')">×</button>
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="op" onclick="appendOperator('-')">-</button>
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="op" onclick="appendOperator('+')">+</button>
            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button class="span-two equal" onclick="compute()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
